<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tenant Pulse Survey</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --bg:#eef1ef;
  --card:#ffffff;
  --primary:#2f3a3b;
  --accent:#6b8f8b;
  --border:#dfe4e1;
  --text:#1f2933;
  --muted:#6b7280;
}

body {
  font-family: system-ui,-apple-system,"Noto Sans JP",sans-serif;
  background: var(--bg);
  padding: 24px;
}

.card {
  max-width: 760px;
  margin: auto;
  background: var(--card);
  border-radius: 16px;
  padding: 32px;
}

h1 {
  margin-top: 0;
}

.section {
  display: none;
}
.section.active {
  display: block;
}

.progress {
  text-align: right;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 12px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  margin-bottom: 12px;
  font-family: inherit;
}

textarea { resize: none; }

.rating {
  font-size: 26px;
  margin-bottom: 16px;
}

.star {
  cursor: pointer;
  color: #d1d5db;
}
.star.active {
  color: var(--accent);
}

.preview {
  background: #f3f4f2;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 12px;
}

.actions {
  display: flex;
  justify-content: space-between;
  gap: 12px;
}

button {
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: var(--primary);
  color: #fff;
  cursor: pointer;
}
button.secondary {
  background: #e5e7eb;
  color: #374151;
}
</style>
</head>

<body>

<div class="card" id="surveyView">
  <h1>Tenant Pulse Survey</h1>

  <!-- STEP 1 -->
  <div class="section active">
    <div class="progress">Step 1 / 3</div>
    <h3>あなたの立場 / Your role</h3>

    <select id="role">
      <option value="">Select / 選択</option>
      <option value="tenant">Tenant</option>
      <option value="visitor">Visitor</option>
      <option value="na">Rather not say</option>
    </select>

    <input id="org" placeholder="Company / Tenant (optional)">
    <input id="unit" placeholder="Unit / Floor (optional)">

    <div class="actions">
      <span></span>
      <button onclick="next()">Next</button>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="section">
    <div class="progress">Step 2 / 3</div>
    <h3>満足度 / Satisfaction</h3>

    <div>Overall experience</div>
    <div class="rating" data-k="overall"></div>

    <div class="actions">
      <button class="secondary" onclick="prev()">Back</button>
      <button onclick="next()">Next</button>
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="section">
    <div class="progress">Step 3 / 3</div>
    <h3>コメント / Comments</h3>

    <textarea id="pos" placeholder="What did you enjoy?" maxlength="140"
      oninput="translateLive(this,'posT')"></textarea>
    <div id="posT" class="preview"></div>

    <textarea id="neg" placeholder="What can be improved?" maxlength="140"
      oninput="translateLive(this,'negT')"></textarea>
    <div id="negT" class="preview"></div>

    <div class="actions">
      <button class="secondary" onclick="prev()">Back</button>
      <button onclick="submitSurvey()">Submit</button>
    </div>
  </div>

  <div style="margin-top:16px;font-size:12px;cursor:pointer"
       onclick="adminLogin()">Admin login</div>
</div>

<div class="card" id="adminView" style="display:none">
  <h1>Admin Dashboard</h1>
  <p id="dashboardMessage"></p>
  <button onclick="startNewSurvey()">Start New Survey</button>
  <button onclick="logout()">Logout</button>
</div>
